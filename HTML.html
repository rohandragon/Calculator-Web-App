<HTML class="html"></HTML>
<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Unified Calculator</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root{
      --primary: #0d6efd;   /* blue */
      --accent:  #6f42c1;   /* purple */
      --light:   #f8f9fa;   /* light background */
      --card-radius: 12px;
      --pad: 12px;
    }
    body { background: var(--light); font-family: Inter, Arial, sans-serif; display:flex; align-items:center; justify-content:center; min-height:100vh; margin:0; }
    .container { width: 360px; }
    .card { background:#fff; border-radius:var(--card-radius); box-shadow:0 6px 18px rgba(15,15,15,0.08); padding: var(--pad); }
    .display { background: linear-gradient(90deg,var(--primary), var(--accent)); color: #fff; font-size:28px; padding:18px; border-radius:10px; text-align:right; margin-bottom:12px; min-height:54px; display:flex; align-items:center; justify-content:flex-end; }
    .keys { display:grid; grid-template-columns: repeat(4,1fr); gap:8px; }
    .keys button { padding:16px; font-size:18px; border-radius:8px; border:none; cursor:pointer; background:#eef2ff; }
    .keys button.op { background: var(--primary); color:#fff; }
    .keys button.eq { background: var(--accent); color:#fff; grid-column:span 2; }
    .small { background:#f1f3f5; }
    .history { margin-top:14px; max-height:160px; overflow:auto; font-size:14px; color:#333; }
    .history h4 { margin:0 0 8px 0; color:var(--primary); }
    .history-item { padding:8px; border-bottom:1px solid #eee; display:flex; justify-content:space-between; }
    .controls { margin-top:10px; display:flex; gap:8px; }
    .controls button { flex:1; padding:10px; border-radius:8px; border:none; cursor:pointer; }
    .btn-danger { background:#ff6b6b; color:#fff; }
    .btn-muted { background:#e9ecef; }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <div id="display" class="display">0</div>

      <div class="keys" id="keys">
        <button onclick="press('7')">7</button>
        <button onclick="press('8')">8</button>
        <button onclick="press('9')">9</button>
        <button class="op" onclick="press('/')">÷</button>

        <button onclick="press('4')">4</button>
        <button onclick="press('5')">5</button>
        <button onclick="press('6')">6</button>
        <button class="op" onclick="press('*')">×</button>

        <button onclick="press('1')">1</button>
        <button onclick="press('2')">2</button>
        <button onclick="press('3')">3</button>
        <button class="op" onclick="press('-')">−</button>

        <button onclick="press('0')">0</button>
        <button onclick="press('.')">.</button>
        <button class="eq" onclick="calculate()">=</button>
        <button class="op" onclick="press('+')">+</button>

        <button class="small" onclick="press('(')">(</button>
        <button class="small" onclick="press(')')">)</button>
        <button class="small" onclick="press('**')">^</button>
        <button class="small" onclick="press('%')">%</button>

        <button class="small" onclick="backspace()">⌫</button>
        <button class="small" onclick="clearDisplay()">C</button>
        <button class="small" onclick="applyFunction('sqrt(')">sqrt</button>
        <button class="small" onclick="applyFunction('log(')">log</button>
      </div>

      <div class="controls">
        <button class="btn-muted" onclick="loadHistory()">Refresh History</button>
        <button class="btn-danger" onclick="clearHistory()">Clear History</button>
      </div>

      <div class="history" id="history">
        <h4>History</h4>
        <div id="history-list">Loading…</div>
      </div>
    </div>
  </div>

  <script>
    // ---- config: API base URL ----
    const API_BASE = "http://127.0.0.1:5000/api"; // change if your Flask runs elsewhere

    // ---- UI state ----
    const display = document.getElementById("display");
    let current = "";

    function press(val){
      if (display.innerText === "0") display.innerText = "";
      current += val;
      display.innerText = current;
    }
    function applyFunction(fn) {
      // e.g. sqrt( => append 'sqrt('
      current += fn;
      display.innerText = current;
    }
    function clearDisplay(){
      current = "";
      display.innerText = "0";
    }
    function backspace(){
      current = current.slice(0, -1);
      display.innerText = current || "0";
    }

    async function calculate(){
      if (!current) return;
      try {
        const resp = await fetch(API_BASE + "/calculate", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ expression: current })
        });
        const data = await resp.json();
        if (resp.ok) {
          display.innerText = data.result;
          current = data.result;
          await loadHistory();
        } else {
          display.innerText = "Error";
          current = "";
          console.error(data);
          alert("Error: " + (data.message || data.error));
        }
      } catch(err){
        console.error(err);
        alert("Network error communicating with API. Is Flask running?");
      }
    }

    async function loadHistory(){
      try {
        const r = await fetch(API_BASE + "/history?limit=30");
        const arr = await r.json();
        const list = document.getElementById("history-list");
        if (!arr.length) {
          list.innerHTML = "<div style='padding:8px'>No history yet.</div>";
          return;
        }
        list.innerHTML = arr.map(it => `<div class="history-item"><span>${escapeHtml(it.expression)}</span><strong>${escapeHtml(it.result)}</strong></div>`).join("");
      } catch(e){
        console.error(e);
      }
    }

    async function clearHistory(){
      if (!confirm("Clear all history?")) return;
      try {
        await fetch(API_BASE + "/clear_history", { method: "POST" });
        loadHistory();
      } catch(e) { console.error(e); }
    }

    function escapeHtml(s){ return (""+s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

    // initial load
    loadHistory();
  </script>
</body>
</html>
